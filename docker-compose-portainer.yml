
volumes:
  erddap-data:

services :
  # remember to setup cron job to update letsencrypt on server
  nginx_proxy:
    image: nginx:latest
    ports:
      - 80:80
      - 443:443
    deploy:
      replicas: 1
      restart_policy:
        condition: none
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/conf.d/:/etc/nginx/conf.d/
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /tmp/acme_challenge:/tmp/acme_challenge
    # restart: always
    networks:
      - nginx_proxy_network
    # network_mode: host

  certbot-service:
    image: certbot/certbot:v1.17.0
    command: sh -c "certbot certonly --expand --webroot -w /tmp/acme_challenge -d erddap.hakai.app --text --agree-tos --email matthew.foster@hakai.org --rsa-key-size 4096 --verbose --keep-until-expiring --preferred-challenges=http"
    entrypoint: ""
    deploy:
      replicas: 1
      restart_policy:
        condition: none
    volumes:
      - "/etc/letsencrypt:/etc/letsencrypt"
      - "/tmp/acme_challenge:/tmp/acme_challenge"
    environment:
      - TERM=xterm
    networks:
      - nginx_proxy_network

  dev:
    image: "axiom/docker-erddap:2.24-jdk21-openjdk"
    restart: always
    ports:
      - "8091:8080"
    deploy:
      replicas: 1
      restart_policy:
        condition: none
    volumes:
      # - "./erddap/conf/robots.txt:/usr/local/tomcat/webapps/ROOT/robots.txt"
      # - "./erddap/content:/usr/local/tomcat/content/erddap"
      # - "./datasets.d:/datasets.d:ro"
      # - "./init.d:/init.d"
      # - "./datasets.d:/datasets.d"
      - "/mnt/efs/erddap-dev:/datasets"
      - "/mnt/efs/algex:/algae_explorer"
      - "erddap-data:/erddapData"
    networks:
      - nginx_proxy_network
    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "-f",
          "http://localhost:8091/erddap/index.html"
        ]
      interval: 10s

networks:
  nginx_proxy_network:
    driver: overlay
