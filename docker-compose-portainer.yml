
volumes:
  erddap-data:

services :
  # must create /tmp/acme_challenge and /etc/letsencrypt on host
  # must install certbot on host https://certbot.eff.org/instructions?ws=other&os=ubuntufocal
  # run this on server first time before spinning up the swarm stack
  # certbot certonly --expand  -w /tmp/acme_challenge -d development.erddap.hakai.app --text --agree-tos --email matthew.foster@hakai.org --rsa-key-size 4096 --verbose --keep-until-expiring --preferred-challenges=http
  nginx_proxy:
    image: ghcr.io/hakaiinstitute/hakai_erddap_nginx_proxy:latest
    build:
      context: ./nginx/
      dockerfile: Dockerfile
    ports:
      - 80:80
      - 443:443
    deploy:
      replicas: 1
      restart_policy:
        condition: none
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /tmp/acme_challenge:/tmp/acme_challenge
    # restart: always
    networks:
      - nginx_proxy_network
    # network_mode: host

  
  # certbot-service:
  #   image: certbot/certbot:v1.17.0
  #   command: sh -c "certbot certonly --expand --webroot -w /tmp/acme_challenge -d development.erddap.hakai.app --text --agree-tos --email matthew.foster@hakai.org --rsa-key-size 4096 --verbose --keep-until-expiring --preferred-challenges=http"
  #   entrypoint: ""
  #   deploy:
  #     replicas: 1
  #     restart_policy:
  #       condition: none
  #   volumes:
  #     - "/etc/letsencrypt:/etc/letsencrypt"
  #     - "/tmp/acme_challenge:/tmp/acme_challenge"
  #   environment:
  #     - TERM=xterm
  #   networks:
  #     - nginx_proxy_network

  dev:
    image: "axiom/docker-erddap:2.24-jdk21-openjdk"
    restart: always
    ports:
      - "8091:8080"
    deploy:
      replicas: 1
      restart_policy:
        condition: none
    volumes:
      # - "./erddap/conf/robots.txt:/usr/local/tomcat/webapps/ROOT/robots.txt"
      # - "./erddap/content:/usr/local/tomcat/content/erddap"
      # - "./datasets.d:/datasets.d:ro"
      # - "./init.d:/init.d"
      # - "./datasets.d:/datasets.d"
      - "/mnt/efs/erddap-dev:/datasets"
      - "/mnt/efs/algex:/algae_explorer"
      - "erddap-data:/erddapData"
    networks:
      - nginx_proxy_network
    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "-f",
          "http://localhost:8091/erddap/index.html"
        ]
      interval: 10s

networks:
  nginx_proxy_network:
    driver: overlay
